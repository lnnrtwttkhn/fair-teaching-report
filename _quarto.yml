bibliography: references.bib
csl: apa.csl
metadata-files:
  - _affiliations.yml
  - _costs.yml

format:
  html:
    theme: [cosmo]
    anchor-sections: true
    smooth-scroll: true
    email-obfuscation: none
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "Contents"
    toc-expand: true
    number-sections: false
    cap-location: bottom
    page-layout: article
    code-fold: true
    code-overflow: wrap
    code-line-numbers: true
    code-copy: true
    code-link: false
    code-annotations: true
    code-tools:
      source: https://github.com/lnnrtwttkhn/fair-teaching-report
      toggle: true
      caption: "Code"
    engine: knitr
    highlight-style: monokai
    link-external-icon: false
    link-external-newwindow: true
    from: "markdown+emoji"
    search: false
    include-after-body: plausible.html
  pdf:
    toc: false
    include-in-header:
      - text: |
          \usepackage{style}
  docx: default